<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NzSN Docs</title>
    <meta name="description" content="Technical documentation collection covering programming, mathematics, systems, and more">
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="site-title">NzSN Docs</h1>
            <p class="site-subtitle">Technical documentation collection</p>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search documents..." autocomplete="off">
            <span class="search-icon">🔍</span>
        </div>
        <div class="stats">
            <span id="doc-count">Loading...</span> documents
            <button id="view-toggle" class="view-toggle" title="Toggle graph view">
                <span class="view-icon">⊞</span>
            </button>
        </div>
    </header>
    
    <div id="graph-container" class="graph-container hidden">
        <svg id="graph"></svg>
        <div class="graph-controls">
            <a href="/" class="graph-btn graph-home" title="Back to home">Home</a>
            <input type="text" id="graph-search" class="graph-search" placeholder="Search nodes..." autocomplete="off">
            <button id="zoom-reset" class="graph-btn">Reset</button>
            <button id="zoom-in" class="graph-btn">+</button>
            <button id="zoom-out" class="graph-btn">-</button>
        </div>
    </div>

    <main>
        <div class="filter-tags">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="cpp">C/C++</button>
            <button class="filter-btn" data-filter="chromium">Chromium</button>
            <button class="filter-btn" data-filter="v8">V8</button>
            <button class="filter-btn" data-filter="math">Mathematics</button>
            <button class="filter-btn" data-filter="web">Web Dev</button>
            <button class="filter-btn" data-filter="haskell">Haskell</button>
            <button class="filter-btn" data-filter="kube">Kubernetes</button>
            <button class="filter-btn" data-filter="systems">Systems</button>
        </div>
        <div id="docs-container" class="docs-grid">
            <!-- Documents will be rendered here by JavaScript -->
        </div>
        <div id="no-results" class="no-results hidden">
            <p>No documents found matching your search.</p>
        </div>
    </main>

    <footer>
        <p>Generated from Org-mode documents • <a href="https://github.com/nzsn">GitHub</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
